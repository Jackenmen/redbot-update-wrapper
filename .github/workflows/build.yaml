name: Build

on:
  push:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: make build-all

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: ./dist
